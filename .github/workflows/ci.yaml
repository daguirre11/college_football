name: College Football Continuos Integration


on:
  push:
    branches-ignore:
      - "main"
  release:
    types: [ published ]
  workflow_call:
  workflow_dispatch:
    inputs:
      run_integration_tests:
        description: "Run integration tests (using main branch)"
        required: false
        default: false
        type: boolean


env:
  AWS_ACCOUNT_ID: '044110324522'
  AWS_REGION: us-east-2
  ECR_REGISTRY: 044110324522.dkr.ecr.us-east-2.amazonaws.com
  ECR_REPOSITORY: college-football

jobs:
  build-container:
    runs-on: ubuntu-latest
    outputs:
      image: my-college-football-image:latest
    steps:
      - uses: actions/checkout@v5

      - name: Build image from ./Dockerfile
        run: |
          docker build \
            -t my-college-football-image:latest \
            -f ./Dockerfile \
            .

  unit-tests-with-code-coverage:
    needs: build-container
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: false

      - name: Get uv cache directory
        id: uv-cache-dir
        run: echo "path=$(uv cache dir)" >> $GITHUB_OUTPUT

      - name: Cache dependencies
        id: cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.uv-cache-dir.outputs.path }}
          key: ${{ runner.os }}-uv-${{ hashFiles('**/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install dependencies and project in dev mode
        if: steps.cache.outputs.cache-hit != 'true'
        run: make install

      - name: Run tests with coverage
        run: |
          uv run pytest --cov=. \
                        --cov-config=.coveragerc \
                        --cov-report=term-missing \
                        --cov-fail-under=98
        env:
          PY_COLORS: 1


  deploy-to-ecr:
    needs: build-container
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/GitHubActionsRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Get version from ./VERSION file
        id: version
        run: |
          IMAGE_TAG=$(cat ./VERSION | tr -d ' \n\r')
          echo "image-tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Build, tag, and push to ECR
        env:
          IMAGE_TAG: ${{ steps.version.outputs.image-tag }}
        run: |
          FULL_IMAGE="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          docker build -t "$FULL_IMAGE" -f ./Dockerfile .
          docker push "$FULL_IMAGE"
