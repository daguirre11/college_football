name: College Football Continuos Integration


on:
  push:
    branches-ignore:
      - "main"
  release:
    types: [ published ]
  workflow_call:
  workflow_dispatch:
    inputs:
      run_integration_tests:
        description: "Run integration tests (using main branch)"
        required: false
        default: false
        type: boolean
jobs:
  build-container:
    runs-on: ubuntu-24.04
    outputs:
      image: my-college-football-image:latest   # tag to reuse
    steps:
      - uses: actions/checkout@v5

      - name: Build image from ./DockerFile
        run: |
          docker build \
            -t my-college-football-image:latest \
            -f ./DockerFile \
            .
  test:
    needs: build-container
    runs-on: ubuntu-24.04
    container:
      image: my-college-football-image:latest
    steps:
      - uses: actions/checkout@v5

      - name: Test in container
        run: python -m pytest
